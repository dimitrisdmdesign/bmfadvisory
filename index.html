<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMF Advisory & Lab</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .page {
      width: 100%;
      padding: 40px 22px;
    }

    .logo {
      display: inline-block;
      border: 2px solid #fff;
      padding: 28px 36px 30px;
      margin-bottom: 90px;
    }

    .logo-main {
      font-size: 54px;
      letter-spacing: 8px;
      font-weight: 300;
      line-height: 1;
    }

    .logo-line {
      width: 100%;
      height: 1px;
      background: #fff;
      margin: 18px 0 16px;
      opacity: 0.85;
    }

    .logo-sub {
      font-size: 15px;
      letter-spacing: 9px;
      font-weight: 300;
    }

    h1 {
      margin: 0;
      font-size: clamp(58px, 12vw, 120px);
      line-height: 1.15;
      letter-spacing: 16px;
      font-weight: 800;
    }

    .divider {
      width: 90px;
      height: 1px;
      background: #fff;
      margin: 42px auto 36px;
      opacity: 0.85;
    }

    .motto {
      font-size: clamp(18px, 3vw, 28px);
      letter-spacing: 8px;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 44px;
      line-height: 1.6;
    }

    .contact {
      font-size: clamp(16px, 2.5vw, 22px);
      letter-spacing: 1px;
      font-weight: 300;
      opacity: 0.92;
    }

    .contact span {
      opacity: 0.75;
    }

    @media (max-width: 600px) {
      .logo {
        padding: 22px 26px 24px;
        margin-bottom: 80px;
      }

      .logo-main {
        font-size: 42px;
        letter-spacing: 6px;
      }

      .logo-sub {
        font-size: 12px;
        letter-spacing: 6px;
      }

      h1 {
        font-size: 62px;
        letter-spacing: 8px;
      }

      .motto {
        font-size: 18px;
        letter-spacing: 4px;
      }

      .contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="logo">
      <div class="logo-main">BMF</div>
      <div class="logo-line"></div>
      <div class="logo-sub">ADVISORY & LAB</div>
    </div>

    <h1>
      COMING<br />
      SOON
    </h1>

    <div class="divider"></div>

    <div class="motto">
      Bold Moves Forward.<br />
      Ideas Become Assets.
    </div>

    <div class="divider"></div>

    <div class="contact">
      <span>Contact:</span> dimitrisdmdesign@gmail.com
    </div>

  </main>
</body>
</html>
